name: Toolrental
options:
  bundleIdPrefix: com.shimondeitel.toolrental
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Toolrental:
    type: application
    platform: iOS
    sources:
      - path: Toolrental
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolrental
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Toolrental/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToolrentalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToolrentalTests
    dependencies:
      - target: Toolrental
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolrental.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToolrentalUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToolrentalUITests
    dependencies:
      - target: Toolrental
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolrental.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Toolrental:
    build:
      targets:
        Toolrental: all
        ToolrentalTests: [test]
        ToolrentalUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Toolrental.storekit
    test:
      config: Debug
      storeKitConfiguration: Toolrental.storekit
      targets:
        - ToolrentalTests
        - ToolrentalUITests
    archive:
      config: Release
