<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toolrental</title>
<style>
body{margin:0;background:rgb(33,27,21);color:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.wrap{max-width:560px;padding:40px 24px}
h1{font-size:2.4rem;margin-bottom:8px;color:rgb(176,137,104)}
p{line-height:1.5;color:#cfcfcf}
.badge{display:inline-block;margin-top:24px;padding:10px 20px;border:1px solid rgb(176,137,104);border-radius:999px;color:rgb(176,137,104)}
a{color:rgb(176,137,104)}
footer{margin-top:40px;font-size:.85rem;color:#888}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1>Toolrental</h1>
<p>Track equipment and tool rental costs and return-by dates.</p>
<div class="badge">iOS · Coming Soon</div>
<footer><a href="privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="terms.html">Terms</a> &nbsp;·&nbsp; s0533495227@gmail.com</footer>
</div>
</body></html>
